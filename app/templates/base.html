<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ReBrewie Control Pi{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css?v=blink-balanced-1" />
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="2" width="20" height="28" rx="3" fill="#f5a623" stroke="#c47d0e" stroke-width="1.5"/>
      <rect x="10" y="6" width="12" height="4" rx="1" fill="#fff" opacity=".7"/>
      <ellipse cx="16" cy="18" rx="6" ry="7" fill="#c47d0e" opacity=".6"/>
      <circle cx="16" cy="18" r="3" fill="#fff" opacity=".5"/>
    </svg>
    <span>ReBrewie Control Pi</span>
  </div>
  <ul class="nav-links">
    <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a></li>
    <li><a href="/progress" class="{% if request.url.path == '/progress' %}active{% endif %}">Progress</a></li>
    <li><a href="/preparation" class="{% if request.url.path == '/preparation' %}active{% endif %}">Preparation</a></li>
    <li><a href="/cleaning" class="{% if request.url.path == '/cleaning' %}active{% endif %}">Cleaning</a></li>
    <li><a href="/recipes" class="{% if '/recipes' in request.url.path %}active{% endif %}">Recipes</a></li>
    <li><a href="/developer" class="{% if request.url.path == '/developer' %}active{% endif %}">Developer</a></li>
  </ul>
  <div class="nav-status">
    <span id="conn-dot" class="dot {% if state.connected %}dot-green{% else %}dot-red{% endif %}"></span>
    <span id="conn-label">{{ "Connected" if state.connected else "Disconnected" }}</span>
  </div>
</nav>

<main class="container">
  {% block content %}{% endblock %}
</main>

<script src="/static/js/ws.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
