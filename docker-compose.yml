version: "3.9"

services:
  rebrewie:
    build: .
    image: rebrewie-control-pi:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Persist recipes outside the container
      - recipes_data:/data/recipes
    # ── Serial device passthrough (uncomment for BREWIE_TRANSPORT=serial) ────
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    # group_add:
    #   - "20"   # dialout GID on Raspberry Pi OS

volumes:
  recipes_data:
